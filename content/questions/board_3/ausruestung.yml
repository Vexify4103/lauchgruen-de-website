category: ausruestung
displayName: Ausrüstung
questions:
  - points: 100
    prompt: "Aus welchem Material werden die Klingen des 3DM-Equipments gefertigt, da normale Metalle Titanenhaut kaum durchdringen?"
    answer: Ultrahartes Stahl (Hartstahlklingen)
  - points: 200
    prompt: "Wo befindet sich der einzige tödliche Schwachpunkt eines normalen Titans?"
    answer: Nacken (Genick, das Stück Fleisch am Hinterkopf)
  - points: 300
    prompt: "Welche Sonderwaffe wird in Staffel 4 speziell gegen gehärtete Titanen entwickelt?"
    answer: Donnerspeere (Thunder Spears)
  - points: 400
    prompt: "Wie heißt die Gasquelle, mit der das 3DM-Equipment die Haken und Klingen antreibt?"
    answer: Ikagas (Ikaga-Gas / Druckgas)
  - points: 500
    prompt: "Welche Spezialwaffe verwendet die Anti-Titan-Artillerie in Marley, die auch Titanen in Küstenregionen bekämpfen kann?"
    answer: Titan-Kanone / Marley-Artillerie (Anti-Titan-Geschütz)
