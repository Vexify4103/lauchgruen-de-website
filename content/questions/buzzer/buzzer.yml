# Bonus-buzzer image rounds.
#
# Each entry maps to an image file in this directory (content/questions/buzzer/).
# When a normal round ends (all contestants played one question), one of these
# is shown to everyone; the first player to buzz gets one shot at answering.
#
# Correct → +points · Wrong → -half points · Each round used at most once per game.
# Once all 18 are consumed, bonus buzz simply stops firing (regular play
# continues normally).
#
# To replace images: drop `buzzer_<n>.png` (or .jpg / .webp / etc.) next to
# this file and update the matching `image:` field below. The /questions
# route serves any file in this folder directly.

default_points: 500

rounds:
